<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(160deg,#fff0f7 0%,#ffe4f0 40%,#ffd6eb 100%);min-height:100vh;font-family:'Nunito',sans-serif;overflow-x:hidden}
::-webkit-scrollbar{width:0}

.star{position:fixed;pointer-events:none;z-index:0;animation:twinkle 2.5s ease-in-out infinite}
@keyframes twinkle{0%,100%{transform:scale(1) rotate(0deg)}50%{transform:scale(1.3) rotate(15deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-3deg)}75%{transform:rotate(3deg)}}
@keyframes flash{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes bounceCat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-7px) scale(1.1)}}
.fade-up{animation:fadeUp 0.28s ease forwards}

#app{max-width:440px;margin:0 auto;padding:28px 16px 80px;position:relative;z-index:1}

/* ── TITLE ── */
#title-block{
  text-align:center;margin-bottom:22px;
  background:white;border-radius:24px;
  padding:22px 20px 18px;
  border:2px solid #ffd6e8;
  box-shadow:0 6px 24px #ff6b9d15;
}
#title-cats{display:flex;justify-content:center;gap:4px;margin-bottom:10px}
.title-cat{font-size:26px;animation:bounceCat 1.8s ease-in-out infinite;display:inline-block}
.title-cat:nth-child(1){animation-delay:0s}
.title-cat:nth-child(2){animation-delay:0.15s}
.title-cat:nth-child(3){animation-delay:0.3s}
.title-cat:nth-child(4){animation-delay:0.45s}
.title-cat:nth-child(5){animation-delay:0.6s}
.title-cat:nth-child(6){animation-delay:0.75s}

.title-main{font-family:'Pacifico',cursive;line-height:1.15;margin-bottom:2px}
.t-line1{font-size:44px;color:#ff3a7d;text-shadow:3px 3px 0 #ffd6e8;display:block}
.t-line2{font-size:40px;color:#ff6b9d;text-shadow:3px 3px 0 #ffd6e8;display:block}
.t-bu{font-size:50px;color:#cc3366;display:inline-block;transform:translateY(3px)}

#tagline{font-size:10.5px;color:#cc8899;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-top:10px}
.tl-dot{color:#ffb7d5;margin:0 5px}

/* ── KITTY + SIDE CATS ── */
#kitty-row{display:flex;justify-content:center;align-items:center;gap:16px;margin-bottom:20px}
#kitty-wrap{display:inline-block;animation:bounce 2s ease-in-out infinite;filter:drop-shadow(0 4px 12px #ff6b9d44)}
.side-cat{font-size:34px;animation:bounceCat 2.2s ease-in-out infinite}
.side-cat.l{animation-delay:0.3s}
.side-cat.r{animation-delay:0.6s}

/* ── DAY TABS ── */
#day-row{display:flex;gap:6px;margin-bottom:20px}
.day-btn{flex:1;padding:10px 4px;border-radius:14px;font-family:'Nunito',sans-serif;font-size:11px;text-align:center;cursor:pointer;transition:all 0.18s;font-weight:600;border:2.5px solid transparent}
.day-btn:hover{transform:translateY(-2px)}
.day-btn.active{background:#ff6b9d;color:white;box-shadow:0 4px 12px #ff6b9d55;font-weight:800}
.day-btn.today:not(.active){border:2.5px dashed #ff6b9d;background:white;color:#cc4477}
.day-btn:not(.active):not(.today){background:white;color:#cc4477}
.day-btn.allcomp:not(.active){background:#ffd6e8}
.day-tick{font-size:8px;display:block}

/* ── DAY CARD ── */
#day-card{background:white;border-radius:24px;padding:20px 18px;box-shadow:0 8px 32px #ff6b9d22,0 2px 8px #ff6b9d11;border:2px solid #ffd6e8;margin-bottom:16px}
#day-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
#day-name{font-size:22px;font-weight:800;color:#cc3366;margin-bottom:3px}
#day-count{font-size:12px;color:#dd88aa;font-weight:600}
#progress-ring{flex-shrink:0}

#bar-wrap{height:8px;background:#fde8f2;border-radius:99px;margin-bottom:16px;overflow:hidden}
#bar-fill{height:100%;border-radius:99px;transition:width 0.4s ease,background 0.4s;background:linear-gradient(90deg,#ff6b9d,#ffb7d5)}

/* ── CHORES ── */
#chore-list{display:flex;flex-direction:column;gap:7px}
.chore-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;cursor:pointer;transition:all 0.18s;box-shadow:0 2px 6px #ff6b9d11;border:2px solid #fde8f2;background:white}
.chore-row:hover{transform:translateX(3px)}
.chore-row.done{background:#fff0f7;border-color:#ffb7d5}
.chore-row.remove-mode{border:2px dashed #ffb7d5;animation:wiggle 0.4s ease infinite}
.chore-emoji{font-size:20px;flex-shrink:0}
.chore-label{flex:1;font-size:13.5px;font-weight:600;line-height:1.3;color:#553344}
.chore-row.done .chore-label{text-decoration:line-through;color:#cc88aa}
.chore-check{width:22px;height:22px;border-radius:99px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.18s;border:2px solid #ffb7d5;background:white}
.chore-check.checked{background:#ff6b9d;border-color:#ff6b9d;color:white;font-size:11px;font-weight:800;box-shadow:0 2px 8px #ff6b9d44}
.remove-x{color:#ff6b9d;font-size:18px;font-weight:800;flex-shrink:0}
#empty-msg{text-align:center;color:#ffb7d5;font-size:14px;font-weight:600;padding:24px 0}

/* ── ADD BOX ── */
#add-box{background:#fff8fc;border:2px dashed #ffb7d5;border-radius:16px;padding:16px 14px;margin-top:12px;display:none}
#add-box.visible{display:block}
#add-title{font-size:12px;color:#ff6b9d;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:12px}
#emoji-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.emoji-btn{font-size:16px;width:32px;height:32px;border-radius:8px;border:1px solid transparent;background:#fff0f7;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.emoji-btn:hover{transform:scale(1.2)}
.emoji-btn.selected{background:#ff6b9d33;border-color:#ff6b9d;transform:scale(1.25);box-shadow:0 2px 8px #ff6b9d33}
#add-input-row{display:flex;align-items:center;gap:10px;background:white;border-radius:12px;padding:10px 12px;border:2px solid #ffd6e8;margin-bottom:12px}
#new-emoji-preview{font-size:22px}
#new-label{flex:1;border:none;background:transparent;font-family:'Nunito',sans-serif;font-size:14px;color:#553344;font-weight:600;outline:none}
#add-btns{display:flex;gap:8px;justify-content:flex-end}
.cancel-btn{background:white;border:2px solid #ffd6e8;color:#cc88aa;border-radius:99px;padding:8px 16px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer}
.confirm-btn{background:#ff6b9d;border:none;color:white;border-radius:99px;padding:8px 18px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;box-shadow:0 3px 10px #ff6b9d44}

/* ── DONE MSG ── */
#done-msg{margin-top:14px;background:linear-gradient(135deg,#fff0f7,#ffd6e8);border:2px solid #ffb7d5;border-radius:16px;padding:14px 18px;display:none;align-items:center;gap:14px}
#done-msg.visible{display:flex}
#done-kitty{flex-shrink:0}
#done-txt{font-size:16px;font-weight:800;color:#ff3a7d}
#done-sub{font-size:12px;color:#cc6688;font-weight:600;margin-top:2px}

/* ── ACTIONS ── */
#action-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.action-btn{flex:1;min-width:100px;background:white;border:2px solid #ffb7d5;color:#ff6b9d;border-radius:99px;padding:10px 12px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.18s;text-align:center;box-shadow:0 2px 8px #ff6b9d11}
.action-btn:hover{background:#fff0f7;transform:translateY(-1px)}
.action-btn.active{background:#ff6b9d;color:white;border-color:transparent}
.action-btn.saved{background:#ff3a7d;color:white;border-color:transparent;animation:flash 0.4s ease 3}

/* ── SAT CARD ── */
#sat-note{background:white;border:2px solid #ffd6e8;border-radius:20px;padding:16px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 16px #ff6b9d11}
#sat-emoji-row{font-size:24px;letter-spacing:2px}
#sat-title{font-size:15px;font-weight:800;color:#ff3a7d;margin-bottom:2px}
#sat-sub{font-size:12px;color:#cc6688;font-weight:600}

/* ── FOOTER ── */
#footer{text-align:center;margin-top:20px;font-size:10px;color:#e0aabb;font-weight:700;letter-spacing:0.1em;text-transform:uppercase}
</style>
</head>
<body>
<div id="stars-wrap"></div>
<div id="app">

  <!-- TITLE -->
  <div id="title-block">
    <div id="title-cats">
      <span class="title-cat">🐱</span>
      <span class="title-cat">😺</span>
      <span class="title-cat">🐾</span>
      <span class="title-cat">😸</span>
      <span class="title-cat">💅</span>
      <span class="title-cat">🐱</span>
    </div>
    <div class="title-main">
      <span class="t-line1">Bad Bitch</span>
      <span class="t-line2"><span class="t-bu">不</span> Cry</span>
    </div>
    <div id="tagline">
      <span>unbothered</span><span class="tl-dot">🐾</span>
      <span>that girl</span><span class="tl-dot">🐾</span>
      <span>her era</span>
    </div>
  </div>

  <!-- KITTY -->
  <div id="kitty-row">
    <span class="side-cat l">🐱</span>
    <div id="kitty-wrap">
      <svg width="90" height="90" viewBox="0 0 100 100" fill="none">
        <ellipse cx="50" cy="54" rx="38" ry="36" fill="white" stroke="#f9a8c9" stroke-width="2"/>
        <polygon points="16,28 26,8 36,28" fill="white" stroke="#f9a8c9" stroke-width="2"/>
        <polygon points="64,28 74,8 84,28" fill="white" stroke="#f9a8c9" stroke-width="2"/>
        <polygon points="20,26 27,12 34,26" fill="#ffb7d5"/>
        <polygon points="66,26 73,12 80,26" fill="#ffb7d5"/>
        <ellipse cx="37" cy="52" rx="5" ry="5.5" fill="#2d2d2d"/>
        <ellipse cx="63" cy="52" rx="5" ry="5.5" fill="#2d2d2d"/>
        <circle cx="39" cy="50" r="1.5" fill="white"/>
        <circle cx="65" cy="50" r="1.5" fill="white"/>
        <ellipse cx="50" cy="60" rx="3" ry="2" fill="#ffb7d5"/>
        <ellipse cx="37" cy="67" rx="5.5" ry="3.5" fill="#ffb7d5" opacity="0.45"/>
        <ellipse cx="63" cy="67" rx="5.5" ry="3.5" fill="#ffb7d5" opacity="0.45"/>
        <line x1="18" y1="57" x2="42" y2="60" stroke="#ccc" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="18" y1="63" x2="42" y2="63" stroke="#ccc" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="58" y1="60" x2="82" y2="57" stroke="#ccc" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="58" y1="63" x2="82" y2="63" stroke="#ccc" stroke-width="1.2" stroke-linecap="round"/>
        <polygon id="bow-l" points="68,22 80,16 80,28" fill="#ff6b9d"/>
        <polygon id="bow-r" points="80,22 92,16 92,28" fill="#ff6b9d"/>
        <circle id="bow-c" cx="80" cy="22" r="5" fill="#ff6b9d"/>
        <circle cx="80" cy="22" r="2.5" fill="#ff3a7d"/>
      </svg>
    </div>
    <span class="side-cat r">😺</span>
  </div>

  <!-- DAY TABS -->
  <div id="day-row"></div>

  <!-- DAY CARD -->
  <div id="day-card">
    <div id="day-header">
      <div>
        <div id="day-name"></div>
        <div id="day-count"></div>
      </div>
      <svg id="progress-ring" width="56" height="56" viewBox="0 0 56 56">
        <circle cx="28" cy="28" r="23" fill="none" stroke="#fde8f2" stroke-width="4"/>
        <circle id="ring-arc" cx="28" cy="28" r="23" fill="none" stroke="#ff6b9d" stroke-width="4"
          stroke-linecap="round" stroke-dasharray="144.51" stroke-dashoffset="144.51"
          transform="rotate(-90 28 28)" style="transition:stroke-dashoffset 0.4s ease,stroke 0.3s"/>
        <text id="ring-txt" x="28" y="33" text-anchor="middle" fill="#ff6b9d" font-size="12" font-family="Nunito" font-weight="800">0%</text>
      </svg>
    </div>
    <div id="bar-wrap"><div id="bar-fill" style="width:0%"></div></div>
    <div id="chore-list"></div>

    <div id="add-box">
      <div id="add-title"></div>
      <div id="emoji-row"></div>
      <div id="add-input-row">
        <span id="new-emoji-preview">🌸</span>
        <input id="new-label" placeholder="What's the chore?" autocomplete="off"/>
      </div>
      <div id="add-btns">
        <button class="cancel-btn" onclick="closeAdd()">cancel</button>
        <button class="confirm-btn" onclick="submitAdd()">add it! 🎀</button>
      </div>
    </div>

    <div id="done-msg">
      <div id="done-kitty">
        <svg width="44" height="44" viewBox="0 0 100 100" fill="none">
          <ellipse cx="50" cy="54" rx="38" ry="36" fill="white" stroke="#f9a8c9" stroke-width="2"/>
          <polygon points="16,28 26,8 36,28" fill="white" stroke="#f9a8c9" stroke-width="2"/>
          <polygon points="64,28 74,8 84,28" fill="white" stroke="#f9a8c9" stroke-width="2"/>
          <polygon points="20,26 27,12 34,26" fill="#ffb7d5"/>
          <polygon points="66,26 73,12 80,26" fill="#ffb7d5"/>
          <ellipse cx="37" cy="52" rx="5" ry="5.5" fill="#2d2d2d"/>
          <ellipse cx="63" cy="52" rx="5" ry="5.5" fill="#2d2d2d"/>
          <circle cx="39" cy="50" r="1.5" fill="white"/>
          <circle cx="65" cy="50" r="1.5" fill="white"/>
          <ellipse cx="50" cy="60" rx="3" ry="2" fill="#ffb7d5"/>
          <polygon points="68,22 80,16 80,28" fill="#ffd700"/>
          <polygon points="80,22 92,16 92,28" fill="#ffd700"/>
          <circle cx="80" cy="22" r="5" fill="#ffd700"/>
          <circle cx="80" cy="22" r="2.5" fill="#ffaa00"/>
        </svg>
      </div>
      <div>
        <div id="done-txt">All done! Flat stays clean, you stay unbothered. 💅</div>
        <div id="done-sub">bad bitch behaviour ✨</div>
      </div>
    </div>
  </div>

  <!-- ACTIONS -->
  <div id="action-bar">
    <button class="action-btn" id="btn-add" onclick="openAdd()">🌸 Add task</button>
    <button class="action-btn" id="btn-remove" onclick="toggleRemove()">🗑️ Remove</button>
    <button class="action-btn" id="btn-save" onclick="saveWeek()">💾 Next week</button>
  </div>

  <!-- SAT -->
  <div id="sat-note">
    <div id="sat-emoji-row">🎀🐱🎀</div>
    <div>
      <div id="sat-title">Saturday is FREE!</div>
      <div id="sat-sub">No chores. Only vibes. Bad bitches rest too 💅</div>
    </div>
  </div>

  <div id="footer">stay clean · stay unbothered · 不 cry</div>
</div>

<script type="module">
const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri"];
const FULL_DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday"];
const DAY_CATS = ["😺","🐱","😸","🙀","😻","🐾"];
const EMOJIS = ["✅","🧹","🪣","🍽️","👕","🛏️","🚿","🌀","🛍️","🍳","🗑️","🪟","💡","📦","🪞","💻","🌿","🧺","🥗","🚽","🌸","🎀","💅","🐱","💕","😺","🐾","✨","👑","💪"];

const DEFAULT_CHORES = [
  {id:"dishes",       emoji:"🍽️", label:"Clean dishes",                 days:[0,1,2,3,4,5]},
  {id:"wipe_kitchen", emoji:"🧽", label:"Clean kitchen surfaces",       days:[0,2,4]},
  {id:"quick_tidy",   emoji:"🛋️", label:"Quick tidy — living room",     days:[1,3,5]},
  {id:"take_bins",    emoji:"🗑️", label:"Take out the bins",            days:[2,5]},
  {id:"air_out",      emoji:"🪟", label:"Open windows / air the flat",  days:[0,2,4]},
  {id:"washing_on",   emoji:"👕", label:"Put washing on",               days:[0,3]},
  {id:"hang_dry",     emoji:"🧺", label:"Hang or fold clothes",         days:[0,3]},
  {id:"hoover",       emoji:"🌀", label:"Hoover the flat",              days:[0,3]},
  {id:"mop",          emoji:"🪣", label:"Mop kitchen floor",            days:[2]},
  {id:"bathroom",     emoji:"🚿", label:"Clean bathroom sink & mirror", days:[2,5]},
  {id:"toilet",       emoji:"🚽", label:"Clean the toilet",             days:[0,4]},
  {id:"shower",       emoji:"✨", label:"Clean the shower / bath",      days:[1,4]},
  {id:"tidy_bedroom", emoji:"🛏️", label:"Tidy bedroom",                days:[1,3,5]},
  {id:"bed_sheets",   emoji:"🌸", label:"Change bed sheets",            days:[0]},
  {id:"meal_prep",    emoji:"🥗", label:"Meal prep / batch cook",       days:[0,3]},
  {id:"cook_dinner",  emoji:"🍳", label:"Cook a proper dinner",         days:[1,2,4,5]},
  {id:"groceries",    emoji:"🛍️", label:"Groceries / restock",          days:[0]},
  {id:"mirrors",      emoji:"🪞", label:"Clean mirrors & glass",        days:[1,4]},
  {id:"declutter",    emoji:"📦", label:"Clear random clutter",         days:[5]},
  {id:"clean_desk",   emoji:"💻", label:"Wipe down desk / work area",   days:[0,3]},
];

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem("bbcry_v3") || "{}");
    return { chores: s.chores || JSON.parse(JSON.stringify(DEFAULT_CHORES)), done: s.done || {} };
  } catch(e) { return { chores: JSON.parse(JSON.stringify(DEFAULT_CHORES)), done: {} }; }
}
function saveState() {
  localStorage.setItem("bbcry_v3", JSON.stringify({ chores: state.chores, done: state.done }));
}

let state = loadState();
const todayReal = new Date().getDay() === 6 ? -1 : new Date().getDay();
let activeDay = todayReal === -1 ? 0 : todayReal;
let removeMode = false;
let selectedEmoji = "🌸";

(function() {
  const wrap = document.getElementById("stars-wrap");
  const items = ["⭐","🌸","💕","✨","🎀","🐾"];
  for (let i = 0; i < 20; i++) {
    const s = document.createElement("div");
    s.className = "star";
    s.style.left = `${(i*37+11)%100}%`;
    s.style.top = `${(i*53+7)%100}%`;
    s.style.fontSize = `${[8,10,12][i%3]}px`;
    s.style.opacity = (0.10 + (i%4)*0.035).toFixed(2);
    s.style.animationDuration = `${2+(i%3)}s`;
    s.style.animationDelay = `${(i*0.28).toFixed(1)}s`;
    s.textContent = items[i%6];
    wrap.appendChild(s);
  }
})();

function render() { renderDayTabs(); renderDayCard(); }

function renderDayTabs() {
  const row = document.getElementById("day-row");
  row.innerHTML = "";
  DAYS.forEach((d, i) => {
    const btn = document.createElement("button");
    btn.className = "day-btn";
    const dc = state.chores.filter(c => c.days.includes(i));
    const comp = dc.filter(c => !!state.done[`${i}-${c.id}`]).length;
    const allComp = dc.length > 0 && comp === dc.length;
    if (i === activeDay) btn.classList.add("active");
    else if (i === todayReal) btn.classList.add("today");
    if (allComp && i !== activeDay) btn.classList.add("allcomp");
    btn.innerHTML =
      `<span style="font-size:13px;display:block;margin-bottom:1px">${DAY_CATS[i]}</span>` +
      `<span style="font-size:10px;display:block;font-weight:800">${d}</span>` +
      (allComp ? `<span class="day-tick">✓</span>` : `<span class="day-tick" style="opacity:0">·</span>`);
    btn.onclick = () => { activeDay = i; removeMode = false; closeAdd(); render(); };
    row.appendChild(btn);
  });
}

function renderDayCard() {
  const dc = state.chores.filter(c => c.days.includes(activeDay));
  const comp = dc.filter(c => !!state.done[`${activeDay}-${c.id}`]).length;
  const pct = dc.length ? Math.round(comp / dc.length * 100) : 0;
  const allDone = pct === 100 && dc.length > 0;

  document.getElementById("day-name").textContent = `${DAY_CATS[activeDay]} ${FULL_DAYS[activeDay]} 🌸`;
  document.getElementById("day-count").textContent = allDone
    ? "All done! You're amazing! ✨"
    : `${comp} of ${dc.length} tasks done`;

  const circ = 2 * Math.PI * 23;
  document.getElementById("ring-arc").style.strokeDashoffset = circ * (1 - pct/100);
  document.getElementById("ring-arc").style.stroke = allDone ? "#ff3a7d" : "#ff6b9d";
  document.getElementById("ring-txt").textContent = `${pct}%`;
  document.getElementById("ring-txt").setAttribute("fill", allDone ? "#ff3a7d" : "#ff6b9d");

  const bar = document.getElementById("bar-fill");
  bar.style.width = `${pct}%`;
  bar.style.background = allDone
    ? "linear-gradient(90deg,#ff6b9d,#ffd700)"
    : "linear-gradient(90deg,#ff6b9d,#ffb7d5)";

  const bowColor = allDone ? "#ffd700" : "#ff6b9d";
  ["bow-l","bow-r","bow-c"].forEach(id => document.getElementById(id).setAttribute("fill", bowColor));

  const list = document.getElementById("chore-list");
  list.innerHTML = "";
  if (dc.length === 0) {
    const e = document.createElement("div");
    e.id = "empty-msg";
    e.textContent = "No chores here! Add one below 🐱";
    list.appendChild(e);
  }
  dc.forEach((chore, i) => {
    const key = `${activeDay}-${chore.id}`;
    const isDone = !!state.done[key];
    const choreRow = document.createElement("div");
    choreRow.className = "chore-row fade-up" + (isDone && !removeMode ? " done" : "") + (removeMode ? " remove-mode" : "");
    choreRow.style.animationDelay = `${i * 0.035}s`;
    if (removeMode) {
      choreRow.innerHTML =
        `<span class="chore-emoji">${chore.emoji}</span>` +
        `<span class="chore-label">${chore.label}</span>` +
        `<span class="remove-x">✕</span>`;
      choreRow.onclick = () => removeChore(chore.id);
    } else {
      choreRow.innerHTML =
        `<span class="chore-emoji">${chore.emoji}</span>` +
        `<span class="chore-label">${chore.label}</span>` +
        `<div class="chore-check${isDone ? " checked" : ""}">${isDone ? "✓" : ""}</div>`;
      choreRow.onclick = () => toggleDone(key);
    }
    list.appendChild(choreRow);
  });

  const dm = document.getElementById("done-msg");
  allDone && !removeMode ? dm.classList.add("visible") : dm.classList.remove("visible");
}

function toggleDone(key) { state.done[key] = !state.done[key]; saveState(); render(); }

function removeChore(id) {
  state.chores = state.chores
    .map(c => c.id === id ? { id:c.id, emoji:c.emoji, label:c.label, days:c.days.filter(d => d !== activeDay) } : c)
    .filter(c => c.days.length > 0);
  saveState(); render();
}

function toggleRemove() {
  removeMode = !removeMode; closeAdd();
  const btn = document.getElementById("btn-remove");
  btn.classList.toggle("active", removeMode);
  btn.textContent = removeMode ? "✓ Done removing" : "🗑️ Remove";
  render();
}

function saveWeek() {
  state.done = {}; saveState();
  const btn = document.getElementById("btn-save");
  btn.classList.add("saved"); btn.textContent = "Saved! 💕";
  setTimeout(() => { btn.classList.remove("saved"); btn.textContent = "💾 Next week"; }, 2200);
  render();
}

function openAdd() {
  removeMode = false;
  document.getElementById("btn-remove").classList.remove("active");
  document.getElementById("btn-remove").textContent = "🗑️ Remove";
  buildEmojiPicker();
  document.getElementById("add-title").textContent = `✨ New chore for ${FULL_DAYS[activeDay]}`;
  document.getElementById("add-box").classList.add("visible");
  document.getElementById("new-label").focus();
}

function closeAdd() {
  document.getElementById("add-box").classList.remove("visible");
  document.getElementById("new-label").value = "";
}

function buildEmojiPicker() {
  const row = document.getElementById("emoji-row");
  row.innerHTML = "";
  EMOJIS.forEach(e => {
    const btn = document.createElement("button");
    btn.className = "emoji-btn" + (e === selectedEmoji ? " selected" : "");
    btn.textContent = e;
    btn.onclick = () => {
      selectedEmoji = e;
      document.getElementById("new-emoji-preview").textContent = e;
      row.querySelectorAll(".emoji-btn").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
    };
    row.appendChild(btn);
  });
  document.getElementById("new-emoji-preview").textContent = selectedEmoji;
}

function submitAdd() {
  const label = document.getElementById("new-label").value.trim();
  if (!label) return;
  state.chores.push({ id: `custom_${Date.now()}`, emoji: selectedEmoji, label, days: [activeDay] });
  saveState(); closeAdd(); render();
}

document.getElementById("new-label").addEventListener("keydown", e => { if (e.key === "Enter") submitAdd(); });

window.openAdd = openAdd;
window.closeAdd = closeAdd;
window.submitAdd = submitAdd;
window.toggleRemove = toggleRemove;
window.saveWeek = saveWeek;

render();
</script>
</body>
</html>
